<!DOCTYPE html>
<html>
<head>
    <title>Auth Test</title>
</head>
<body>
    <h1>Authentication Test</h1>
    
    <h2>Test Login</h2>
    <button onclick="testLogin()">Test Login</button>
    <div id="loginResult"></div>
    
    <h2>Test Registration</h2>
    <button onclick="testRegister()">Test Register</button>
    <div id="registerResult"></div>

    <script>
        async function testLogin() {
            try {
                const response = await fetch('http://localhost:5001/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'test3@example.com',
                        password: 'Password123'
                    })
                });
                
                const data = await response.json();
                document.getElementById('loginResult').innerHTML = `
                    <h3>Login Result:</h3>
                    <p>Status: ${response.status}</p>
                    <p>Message: ${data.message}</p>
                    <p>User Role: ${data.user?.role}</p>
                    <p>Token: ${data.token ? 'Generated' : 'Missing'}</p>
                `;
            } catch (error) {
                document.getElementById('loginResult').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        async function testRegister() {
            try {
                const response = await fetch('http://localhost:5001/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: 'Test User',
                        email: 'test5@example.com',
                        password: 'Password123',
                        role: 'student'
                    })
                });
                
                const data = await response.json();
                document.getElementById('registerResult').innerHTML = `
                    <h3>Registration Result:</h3>
                    <p>Status: ${response.status}</p>
                    <p>Message: ${data.message}</p>
                    <p>User Role: ${data.user?.role}</p>
                    <p>Token: ${data.token ? 'Generated' : 'Missing'}</p>
                `;
            } catch (error) {
                document.getElementById('registerResult').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
